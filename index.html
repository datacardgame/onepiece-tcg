<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OP-01 ROMANCE DAWN — ราคาการ์ด</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+Thai:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #c9a84c;
    --gold-light: #f0d080;
    --dark: #0d0d0d;
    --dark2: #161616;
    --dark3: #1e1e1e;
    --red: #e83333;
    --text: #e8e0d0;
    --text-dim: #888;
    --psec: #ff4444;
    --sec: #ff8c00;
    --psr: #c9a84c;
    --sr: #c0c0c0;
    --pr: #88ccff;
    --r: #66aaff;
    --puc: #cc88ff;
    --uc: #aa66dd;
    --pc: #88dd88;
    --c: #666;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--dark);
    color: var(--text);
    font-family: 'Noto Sans Thai', sans-serif;
    min-height: 100vh;
  }

  /* Header */
  .header {
    background: linear-gradient(135deg, #0d0d0d 0%, #1a0a00 50%, #0d0d0d 100%);
    border-bottom: 2px solid var(--gold);
    padding: 32px 24px 20px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-inner {
    max-width: 1400px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    gap: 20px;
    flex-wrap: wrap;
  }
  .header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2rem, 5vw, 3.5rem);
    letter-spacing: 0.08em;
    background: linear-gradient(135deg, var(--gold), var(--gold-light), var(--gold));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
  }
  .header-meta {
    margin-left: auto;
    text-align: right;
    font-size: 0.8rem;
    color: var(--text-dim);
    line-height: 1.6;
  }
  .rate-badge {
    display: inline-block;
    background: rgba(201,168,76,0.15);
    border: 1px solid var(--gold);
    border-radius: 4px;
    padding: 2px 8px;
    font-size: 0.75rem;
    color: var(--gold-light);
    margin-top: 4px;
  }

  /* Filter bar */
  .filter-bar {
    background: var(--dark2);
    border-bottom: 1px solid #2a2a2a;
    padding: 12px 24px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
    position: sticky;
    top: 88px;
    z-index: 99;
  }
  .filter-label { font-size: 0.75rem; color: var(--text-dim); margin-right: 4px; }
  .filter-btn {
    padding: 4px 12px;
    border-radius: 20px;
    border: 1px solid #333;
    background: transparent;
    color: var(--text-dim);
    font-size: 0.75rem;
    cursor: pointer;
    font-family: 'Noto Sans Thai', sans-serif;
    transition: all 0.2s;
  }
  .filter-btn:hover, .filter-btn.active {
    border-color: var(--gold);
    color: var(--gold-light);
    background: rgba(201,168,76,0.1);
  }

  /* Content */
  .content { max-width: 1400px; margin: 0 auto; padding: 24px; }

  /* Section */
  .section { margin-bottom: 40px; }
  .section-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.6rem;
    letter-spacing: 0.1em;
    padding: 8px 16px;
    margin-bottom: 16px;
    border-left: 4px solid;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .section-title.psec { border-color: var(--psec); color: var(--psec); }
  .section-title.sec  { border-color: var(--sec);  color: var(--sec); }
  .section-title.psr  { border-color: var(--psr);  color: var(--psr); }
  .section-title.sr   { border-color: var(--sr);   color: var(--sr); }
  .section-title.pr   { border-color: var(--pr);   color: var(--pr); }
  .section-title.r    { border-color: var(--r);    color: var(--r); }
  .section-title.puc  { border-color: var(--puc);  color: var(--puc); }
  .section-title.uc   { border-color: var(--uc);   color: var(--uc); }
  .section-title.pc   { border-color: var(--pc);   color: var(--pc); }
  .section-title.c    { border-color: var(--c);    color: var(--c); }

  /* Card grid */
  .cards {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 12px;
  }

  .card {
    background: var(--dark3);
    border: 1px solid #2a2a2a;
    border-radius: 8px;
    overflow: hidden;
    transition: transform 0.2s, border-color 0.2s;
    cursor: pointer;
    position: relative;
  }
  .card:hover {
    transform: translateY(-4px);
    border-color: var(--gold);
  }
  .card-img {
    width: 100%;
    aspect-ratio: 5/7;
    object-fit: cover;
    background: #111;
    display: block;
  }
  .card-img-placeholder {
    width: 100%;
    aspect-ratio: 5/7;
    background: linear-gradient(135deg, #1a1a1a, #222);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.7rem;
    color: #444;
    text-align: center;
    padding: 8px;
  }
  .card-body { padding: 8px 10px 10px; }
  .card-id { font-size: 0.65rem; color: var(--text-dim); }
  .card-name {
    font-size: 0.78rem;
    font-weight: 600;
    line-height: 1.3;
    margin: 2px 0 6px;
    color: var(--text);
  }
  .card-prices {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .price-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 4px;
  }
  .price-jpy {
    font-size: 0.85rem;
    font-weight: 700;
    color: var(--gold-light);
  }
  .price-thb {
    font-size: 0.75rem;
    color: #aaa;
  }
  .price-original {
    font-size: 0.65rem;
    color: var(--text-dim);
    text-decoration: line-through;
  }

  /* Rarity dot */
  .rarity-dot {
    position: absolute;
    top: 6px;
    right: 6px;
    width: 8px;
    height: 8px;
    border-radius: 50%;
  }
  .dot-psec { background: var(--psec); box-shadow: 0 0 6px var(--psec); }
  .dot-sec  { background: var(--sec);  box-shadow: 0 0 6px var(--sec); }
  .dot-psr  { background: var(--psr);  box-shadow: 0 0 6px var(--psr); }
  .dot-sr   { background: var(--sr);   box-shadow: 0 0 6px var(--sr); }
  .dot-pr   { background: var(--pr);   box-shadow: 0 0 6px var(--pr); }
  .dot-r    { background: var(--r);    box-shadow: 0 0 6px var(--r); }
  .dot-puc  { background: var(--puc);  box-shadow: 0 0 6px var(--puc); }
  .dot-uc   { background: var(--uc);   box-shadow: 0 0 6px var(--uc); }
  .dot-pc   { background: var(--pc);   box-shadow: 0 0 6px var(--pc); }
  .dot-c    { background: var(--c); }

  .no-stock { opacity: 0.5; }
  .no-stock .card-img-placeholder { background: #0f0f0f; }

  /* Source note */
  .source-note {
    text-align: center;
    font-size: 0.7rem;
    color: var(--text-dim);
    padding: 24px;
    border-top: 1px solid #222;
    margin-top: 40px;
  }
  .source-note a { color: var(--gold); text-decoration: none; }
  .source-note a:hover { text-decoration: underline; }
</style>

<script>
const RATE = 0.2011; // 1 JPY = 0.2011 THB

function jpy2thb(jpy) {
  return Math.round(jpy * RATE);
}

function makeCard(data) {
  const { id, name, rarity, jpy, jpyOld, inStock, imgId } = data;
  const rarityKey = rarity.toLowerCase().replace('-','').replace('-','');
  const thb = jpy2thb(jpy);
  const thbOld = jpyOld ? jpy2thb(jpyOld) : null;
  const stockClass = inStock ? '' : 'no-stock';
  const imgUrl = `https://asia-th.onepiece-cardgame.com/images/cardlist/card/${id}.png?240426`;

  const dotMap = {
    'P-SEC':'dot-psec','SEC':'dot-sec','P-SR':'dot-psr','SR':'dot-sr',
    'P-R':'dot-pr','R':'dot-r','P-UC':'dot-puc','UC':'dot-uc','P-C':'dot-pc','C':'dot-c'
  };

  let priceHtml = `<div class="price-row">
    <span class="price-jpy">¥${jpy.toLocaleString()}</span>
    <span class="price-thb">฿${thb.toLocaleString()}</span>
  </div>`;
  if (jpyOld) {
    priceHtml += `<div class="price-original">ราคาเดิม ¥${jpyOld} / ฿${thbOld}</div>`;
  }
  if (!inStock) {
    priceHtml += `<div style="font-size:0.65rem;color:#e83333;margin-top:2px;">หมดสต็อก</div>`;
  }

  return `<div class="card ${stockClass}" data-rarity="${rarity}" onclick="window.open('https://yuyu-tei.jp/sell/opc/card/op01/${imgId}','_blank')">
    <div class="rarity-dot ${dotMap[rarity]||'dot-c'}"></div>
    <img class="card-img" src="${imgUrl}" alt="${name}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
    <div class="card-img-placeholder" style="display:none">${id}<br>${name}</div>
    <div class="card-body">
      <div class="card-id">${id} · ${rarity}</div>
      <div class="card-name">${name}</div>
      <div class="card-prices">${priceHtml}</div>
    </div>
  </div>`;
}

    div.className = 'section';

    div.innerHTML = `
      <div class="section-title ${sec.cls}">${sec.title}
        <span style="font-family:'Noto Sans Thai';font-size:0.9rem;font-weight:300;color:#aaa;">(${sec.cards.length} การ์ด)</span>

      <div class="cards">${sec.cards.map(c => makeCard(c)).join('')}</div>
    `;
    content.appendChild(div);
  });

});

function filterCards(rarity) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  document.querySelectorAll('.section').forEach(s => {
    if (rarity === 'all' || s.dataset.rarity === rarity) {
      s.style.display = '';
    } else {
      s.style.display = 'none';
    }
  });
}
